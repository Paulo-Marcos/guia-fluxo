# Detecta drift do manifest: se alguem editou dist/skills/<verbo>/SKILL.md ou
# dist/.agents/skills/<verbo>/SKILL.md a mao em vez de regenerar via
# core/build/render-skills.py a partir de core/manifest/manifest.yaml, este
# workflow falha. Tambem roda ai doctor para confirmar que .ai/ esta integro.

name: render-check

on:
  pull_request:
    paths:
      - 'core/manifest/**'
      - 'core/build/**'
      - 'core/src/ai.py'
      - 'dist/skills/**'
      - 'dist/.agents/skills/**'
      - 'dist/.claude-plugin/**'
      - '.ai/process.json'
      - '.ai/backlog.json'
      - '.ai/tasks.json'
      - '.github/workflows/render-check.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  render-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: ai doctor (arquivos de processo integros)
        run: python core/src/ai.py doctor

      - name: render --check (skills geradas em sincronia com manifest)
        run: python core/build/render-skills.py --check
