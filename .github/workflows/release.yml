# Release por tag: quando uma tag `v*` e empurrada, valida que dist/ esta em
# sincronia com o manifest e cria o GitHub Release com notas geradas a partir
# dos commits. A suite (tests.yml) ja gateia cada commit em main; aqui o foco
# e validar o build e publicar o Release a partir da tag.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: render --check (dist em sincronia com o manifest)
        run: python core/build/render-skills.py --check

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
