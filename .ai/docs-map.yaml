# Mapa de documentos vivos deste projeto.
#
# Lido por `ai.py docs-check` e pelo hook do `ai.py finish`.
# Quando ha mapa, o `finish` bloqueia o fechamento ate o agente registrar
# que reviu os candidatos (`--docs-touched` ou `--docs-skip "<motivo>"`).
# Se este arquivo nao existir, o projeto e tratado como "sem controle de docs"
# e o `finish` segue normal, apenas com um aviso amigavel.
#
# Schema completo: docs/reference/docs-map.md
# Por que existe: docs/explanation/por-que-docs-hook.md
# Como manter: docs/how-to/manter-docs-atualizados.md

version: 1

# Triggers suportados (campo `event:`):
#   - event: task-finished               # toda F-NNN ou I-NNN ao finalizar
#       hint: "..."                      # opcional, mostrado ao agente
#   - event: touched                     # se `modifiedFiles` ou git diff contem match
#       paths: ["scripts/ai.*", ...]     # globs (fnmatch)
#   - event: architectural-decision      # agente julga: mudou regra de arquitetura?
#       hint: "..."
# Obs: usamos `event:` em vez de `on:` porque YAML 1.1 trata `on/off/yes/no`
# como booleanos. `event:` evita essa armadilha.

docs:
  - path: FEATURES.md
    purpose: "Catalogo de features e issues entregues (gerado/mantido por ai.py)."
    triggers:
      - event: task-finished
        hint: "Ja e atualizado pelo script no finish; so revisar se quiser ajustar narrativa."

  - path: CHANGELOG.md
    purpose: "Historico user-facing no estilo Keep a Changelog."
    triggers:
      - event: task-finished
        hint: "Adicione entrada se a mudanca for visivel pro usuario do pack."

  - path: README.md
    purpose: "Porta de entrada do projeto."
    triggers:
      - event: touched
        paths:
          - "scripts/ai.py"
          - "scripts/ai.ps1"
          - ".ai/process.json"
        hint: "Se o fluxo padrao ou os comandos da capa mudaram, atualize."

  - path: docs/reference/cli.md
    diataxis: reference
    purpose: "Referencia completa de subcomandos do ai.py / ai.ps1."
    triggers:
      - event: touched
        paths:
          - "scripts/ai.py"
          - "scripts/ai.ps1"
        hint: "Se voce adicionou/mudou subcomando ou flag, documente aqui."

  - path: docs/reference/files.md
    diataxis: reference
    purpose: "Mapa dos arquivos de estado (.ai/*, FEATURES.md, registry.yaml)."
    triggers:
      - event: touched
        paths:
          - ".ai/process.json"
          - ".ai/docs-map.yaml"
        hint: "Atualize se criou novo arquivo de estado/config."

  - path: docs/explanation/visao-geral.md
    diataxis: explanation
    purpose: "Visao arquitetural do pack."
    triggers:
      - event: architectural-decision
        hint: "Mudou a forma de pensar do pack (nova camada, novo ator)? Reescreva o trecho afetado."

  - path: docs/adr/
    diataxis: adr
    purpose: "Decisoes arquiteturais (Architecture Decision Records)."
    triggers:
      - event: architectural-decision
        hint: "Crie 0NNN-titulo.md a partir de docs/adr/template.md."

  - path: CLAUDE.md
    purpose: "Briefing curto para o Claude Code."
    triggers:
      - event: touched
        paths:
          - "skills/manifest.yaml"
          - "scripts/ai.py"
          - ".ai/process.json"
          - ".ai/docs-map.yaml"
        hint: "Se a lista de skills/atalhos ou regras nao-negociaveis mudou, atualize."

  - path: AGENTS.md
    purpose: "Briefing curto para agentes genericos (Codex, Cursor, Antigravity)."
    triggers:
      - event: touched
        paths:
          - "skills/manifest.yaml"
          - "scripts/ai.py"
          - ".ai/process.json"
          - ".ai/docs-map.yaml"
        hint: "Mesma logica do CLAUDE.md."

  - path: CONTRIBUTING.md
    purpose: "Guia pra humanos contribuirem."
    triggers:
      - event: touched
        paths:
          - "scripts/ai.py"
          - ".ai/process.json"
        hint: "Se o fluxo humano mudou (novo passo, nova checagem), atualize."

# Convencoes que o projeto adota; o agente pode considera-las ao decidir
# se deve criar/atualizar docs alem dos listados acima.
conventions:
  diataxis: true
  adr_dir: docs/adr
  changelog: "keep-a-changelog"
