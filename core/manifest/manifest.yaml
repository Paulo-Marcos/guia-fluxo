# Fonte unica de verdade para os skills do Guia Fluxo.
#
# Como funciona (Layout B + D-050 consolidacao):
#   - Este arquivo declara os verbos, suas `description`s e referencia o
#     body markdown em `core/manifest/bodies/<verb>.md`.
#   - Cada verbo tem **um unico body file** apontado pelos dois targets
#     (agent_skill e claude_command). O bit host-especifico fica em
#     `core/manifest/bodies/_partials/post_cli.<host>.md` e e selecionado
#     pelo renderer via `{{include_per_target: _partials/post_cli}}` no
#     body do verbo (D-050).
#   - `core/build/render-skills.py` resolve `body_file` (le do disco) e gera
#     `plugins/guia/commands/<verb>.md` (Claude, plugin command -> /guia:<verb>)
#     + `plugins/guia/.agents/skills/guia-<verb>/SKILL.md` (Codex/Antigravity).
#
# `description` continua inline porque e o gatilho que cada host (Claude,
# Codex, Antigravity) usa pra escolher a skill - manter junto reduz a
# chance de drift na hora de mexer no trigger.
#
# Convencao de description (D-051):
#   1. Comeca com o prefixo canonico (PRIMARY TRIGGER, HANDOFF, READ-ONLY,
#      DEFER-AND-PARK, EVALUATE-AND-CONVERT, REFERENCE/BACKGROUND ONLY,
#      CLOSE, TERMINAL CANCEL, PAUSE, RESUME, PLAN, START, SETUP).
#   2. Definicao curta do que o verbo faz.
#   3. Opcoes/flags reais (--context, --reason, --status, --file, etc.).
#   4. Disambiguacao breve (1-2 alternativas, nao 5).
#   5. Sem mencao a historia (ADR-NNNN, "Phase X", "replaces old", "legacy").
#
# Detalhes em docs/adr/0008-layout-b-manifest.md (Layout B),
# docs/adr/0012-partials-em-bodies.md (partials),
# docs/adr/0013-consolidacao-bodies-por-verbo.md (1 body por verbo).

version: 2

verbs:
  guia-fluxo:
    description: |
      REFERENCE/BACKGROUND ONLY — overview of the Guia Fluxo task-process pipeline (D-NNN tasks, status states, locks, chat-rename, worktree). Use directly when the developer asks for the process overview ("explain Guia Fluxo", "how does this pipeline work"), the installation guide, or the portability checklist. Not a competitor to the action verbs — those route to their own shims first.
    targets:
      agent_skill:
        body_file: bodies/guia-fluxo.md
      claude_command:
        body_file: bodies/guia-fluxo.md

  feature:
    description: |
      PRIMARY TRIGGER — create a new `D-NNN` feature task for a new capability or new functionality, starting implementation immediately. Options: `--context "<why>"` (motivation), `--origin "<source>"` (default: Guia Fluxo), `--status backlog|planned|in-development` (default `in-development`). For defects use `bug`; for maintenance use `chore`; to park without starting use `backlog`.
    targets:
      agent_skill:
        body_file: bodies/feature.md
      claude_command:
        body_file: bodies/feature.md

  bug:
    description: |
      PRIMARY TRIGGER — create a new `D-NNN` bug task for a regression, defect, or incorrect behavior. Options: `--context "<symptom + impact>"`, `--origin "<source>"`, `--status backlog|planned|in-development` (default `in-development`). For new capabilities use `feature`; for maintenance without behavior change use `chore`.
    targets:
      agent_skill:
        body_file: bodies/bug.md
      claude_command:
        body_file: bodies/bug.md

  chore:
    description: |
      PRIMARY TRIGGER — create a new `D-NNN` chore task for maintenance that deserves a trace but isn't a feature or bug: small refactor, dependency upgrade, build/lint tweak, config or doc fix. Options: `--context "<what + why>"`, `--origin "<source>"`, `--status backlog|planned|in-development` (default `in-development`). For new capabilities use `feature`; for broken behavior use `bug`.
    targets:
      agent_skill:
        body_file: bodies/chore.md
      claude_command:
        body_file: bodies/chore.md

  epic:
    description: |
      EPIC — create an `E-NNN` epic to orchestrate a large piece of work that breaks down into smaller stories (D-049). The epic itself does no implementation; it aggregates children. Use `feature/bug/chore "..." --under E-NNN` to attach a child story; `status E-NNN` prints the aggregated tree (closed/total children); `finish E-NNN` is REFUSED while any child is in a non-terminal status (Em desenvolvimento / Aguardando validacao / Planejada / Backlog / Bloqueada). No nested epics (2-level hierarchy only). `cancel` on an epic does NOT cascade: children remain as-is.
    targets:
      agent_skill:
        body_file: bodies/epic.md
      claude_command:
        body_file: bodies/epic.md

  backlog:
    description: |
      DEFER-AND-PARK skill — never starts implementation. Subcommands: `add <title> --context "<why>"` parks an idea (saved to `.guia/tasks.json` with `status=Backlog`); `list` shows all parked items; `promote <id>` delegates to the promote flow. To start work immediately use `feature`/`bug`/`chore`; to evaluate one parked item before converting use `promote`.
    targets:
      agent_skill:
        body_file: bodies/backlog.md
      claude_command:
        body_file: bodies/backlog.md

  promote:
    description: |
      EVALUATE-AND-CONVERT one parked item. Takes `<B-NNN>` or `<D-NNN>` with `status=Backlog`. The agent reads the item, asks any missing question, proposes a plan, calls out locks/risks, and asks worktree y/n — only after developer OK runs the CLI. Required: `--kind feature|bug|chore`. Options: `--assessment "<verdict>"`, `--plan "<step>"` (repeatable), `--worktree`, `--branch <name>`, `--worktree-path <path>`. To add/list parked items use `backlog`; to create a task without parking first use `feature`/`bug`/`chore`.
    targets:
      agent_skill:
        body_file: bodies/promote.md
      claude_command:
        body_file: bodies/promote.md

  ready:
    description: |
      HANDOFF to developer validation — does NOT close the task. **The agent runs this itself when implementation ends**, never the human. The gate that forces human-in-the-loop before `finish`. Options: `--file <path>` (changed files, repeatable), `--summary "<note>"` (implementation notes, repeatable), `--validation "<cmd>"` (validations that passed, repeatable), `--pending "<gap>"` (manual checks still needed, repeatable). To close after validation use `finish`; to inspect without changing state use `status`.
    targets:
      agent_skill:
        body_file: bodies/ready.md
      claude_command:
        body_file: bodies/ready.md

  finish:
    description: |
      CLOSE an already-validated task — runs the docs-check hook and commits by default. **`finish` is the USER's action: the agent only runs it when the developer requests `/guia:finish` or explicitly authorizes, and must NEVER trigger `finish` on its own — stop at `ready` and hand off. Behavioral rule, not a CLI parameter: no env, no flag (D-098 removed the `GUIA_HUMAN_FINISH` env gate the earlier D-080 had tried).** Use only after the developer confirms validation in real use. Required when `.guia/docs-map.yaml` exists: `--docs-touched <path>` (repeatable) or `--docs-skip "<reason>"`. Options: `--file`, `--summary`, `--validation` (same as ready), `--no-commit` (dry close), `--lock --lock-id <slug> --lock-description "..."` (protect files after close). For handoff to validation use `ready`; for inspection use `status`.
    targets:
      agent_skill:
        body_file: bodies/finish.md
      claude_command:
        body_file: bodies/finish.md

  status:
    description: |
      READ-ONLY — show the current active task and its demand title. Optional: `<D-NNN>` to inspect a specific task instead of the current one. Never creates, modifies, advances, or closes a task. To create use `feature`/`bug`/`chore`; for state transitions use `ready`/`finish`/`block`/`unblock`/`cancel`.
    targets:
      agent_skill:
        body_file: bodies/status.md
      claude_command:
        body_file: bodies/status.md

  cancel:
    description: |
      TERMINAL CANCEL — closes the task with `status=Cancelada` (terminal, does not return). Use when the task will NOT be completed: created by mistake, scope dropped, wrong promote. Required: `--reason "<motive>"`. Options: `--keep-worktree` (default removes the worktree if present), `--set-current` (default clears current-task.json if the cancelled task was current). For a temporary pause that will resume use `block`; for a validated close use `finish`.
    targets:
      agent_skill:
        body_file: bodies/cancel.md
      claude_command:
        body_file: bodies/cancel.md

  block:
    description: |
      PAUSE an in-flight task — preserves WIP and moves status to `Bloqueada`. Use when the task will return: waiting on a decision, external dependency, priority swap. Required: `--reason "<motive>"` (recorded in `task.blocks[]`). To resume use `unblock`; for terminal close use `cancel`; for handoff to validation use `ready`.
    targets:
      agent_skill:
        body_file: bodies/block.md
      claude_command:
        body_file: bodies/block.md

  unblock:
    description: |
      RESUME a paused task — moves status from `Bloqueada` back to `Em desenvolvimento`. Inverse of `block`. Options: `--note "<what unblocked>"`. Fails if the task wasn't `Bloqueada` (preserves flow states).
    targets:
      agent_skill:
        body_file: bodies/unblock.md
      claude_command:
        body_file: bodies/unblock.md

  plan:
    description: |
      PLAN — mark a task as `Planejada` (triaged but not started yet). Accepts transition from `Backlog` (parked item that gained priority) or from `Em desenvolvimento` (deprioritized but already known). Options: `--note "<rationale>"`. To begin work use `start` (already triaged) or `promote` (still needs triage); to park without deciding use `backlog`.
    targets:
      agent_skill:
        body_file: bodies/plan.md
      claude_command:
        body_file: bodies/plan.md

  start:
    description: |
      START — begin work on a `Planejada` or `Backlog` task (status → `Em desenvolvimento`). Assumes triage is done (kind already decided); use `promote` when kind still needs deciding. Options: `--note "<starting note>"`. To resume from `Bloqueada` use `unblock`; to create a fresh task use `feature`/`bug`/`chore`.
    targets:
      agent_skill:
        body_file: bodies/start.md
      claude_command:
        body_file: bodies/start.md

  init:
    description: |
      SETUP — initialize Guia Fluxo in the CURRENT project: seed `.guia/` state and deploy the per-project lock config (`.guia/locks/registry.yaml`, `.guia/locks/lock-ignore.txt`) + `.githooks/commit-msg`, then set `git core.hooksPath`. Idempotent and never clobbers existing state. Options: `--no-locks` (seed `.guia/` only), `--force` (overwrite), `--project-name "<name>"`. Often optional — the engine auto-creates `.guia/` on the first task command; run `init` to opt into file locks. To create a demand use `feature`/`bug`/`chore`.
    targets:
      agent_skill:
        body_file: bodies/init.md
      claude_command:
        body_file: bodies/init.md
  upgrade:
    description: |
      MIGRATE — bring an existing project to the current Guia Fluxo layout: move `FEATURES.md` (root) → `.guia/DEMANDAS.md`, `features/registry.yaml` → `.guia/locks/registry.yaml`, `features/lock-ignore.txt` → `.guia/locks/lock-ignore.txt`, and drop `features/` if empty. Uses `git mv` to preserve history when the file is tracked. Idempotent: prints "Layout ja esta atualizado" when there's nothing to do. Options: `--dry-run` lists the plan without mutating. Refuses (exit 1) if any destination already exists — fix by hand. Distinct from `init` (sets up a virgin project), from `/plugin update` (updates the plugin itself), and from `backlog migrate` (legacy `B-NNN` items).
    targets:
      agent_skill:
        body_file: bodies/upgrade.md
      claude_command:
        body_file: bodies/upgrade.md
