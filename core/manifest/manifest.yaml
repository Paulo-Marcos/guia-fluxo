# Fonte unica de verdade para os skills do pack.
#
# Como funciona (Layout B - F-016):
#   - Este arquivo declara os verbos, suas `description`s e referencia o
#     body markdown em `core/manifest/bodies/<verb>.<target>.md`.
#   - `core/build/render-skills.py` resolve `body_file` (le do disco) e
#     gera `dist/skills/<verb>/SKILL.md` + `dist/.agents/skills/ai-<verb>/SKILL.md`.
#   - Para usar o mesmo body em dois targets, aponte ambos para o mesmo
#     arquivo (shared_body explicito) ou use o campo `shared_body:` no
#     verbo declarando body_file unico.
#
# `description` continua inline porque e o gatilho que cada host (Claude,
# Codex, Antigravity) usa pra escolher a skill - manter junto reduz a
# chance de drift na hora de mexer no trigger.
#
# Para alterar comportamento de uma skill: edite o markdown em bodies/ e
# rode `python core/build/render-skills.py`. Bodies sao markdown puro, sem
# YAML wrap-around - preview e diff limpos.
#
# Detalhes em docs/adr/0008-layout-b-manifest.md.

version: 2

verbs:
  ai-process:
    description: |
      REFERENCE/BACKGROUND ONLY for the portable task-process pipeline (F-NNN/I-NNN/B-NNN, locks, chat-rename, worktree). Loaded as context by the dedicated shims, not as a trigger competitor. Do NOT auto-fire on /feature, /issue, /backlog, /promote, /ready, /finish, /status — those route to their own shims first. Use ai-process directly ONLY when the user asks for the full process overview ("explain the AI process", "how does this pipeline work", "como funciona o ai-process") or needs the installation/portability guide.
    targets:
      agent_skill:
        body_file: bodies/ai-process.agent.md
      claude_skill:
        body_file: bodies/ai-process.claude.md

  feature:
    description: |
      PRIMARY TRIGGER for /feature or "$feature". Creates a NEW F-NNN feature task and starts implementation immediately. Do NOT use for: bugs/regressions (use $issue), deferred ideas without starting work (use $backlog), or evaluating an existing B-NNN (use $promote).
    targets:
      agent_skill:
        body_file: bodies/feature.agent.md
      claude_skill:
        body_file: bodies/feature.claude.md

  issue:
    description: |
      PRIMARY TRIGGER for /issue or "$issue". Creates a NEW I-NNN bug/regression task and starts the fix immediately. Do NOT use for: new features or net-new functionality (use $feature), deferred bug ideas (use $backlog), or evaluating an existing B-NNN (use $promote).
    targets:
      agent_skill:
        body_file: bodies/issue.agent.md
      claude_skill:
        body_file: bodies/issue.claude.md

  backlog:
    description: |
      DEFER-AND-PARK skill: never starts implementation. Triggered ONLY by /backlog or "$backlog" with a subcommand (add / list). Saves future ideas to .ai/backlog.json (B-NNN) or lists them. Do NOT use for: starting work now (use $feature for new functionality or $issue for bugs), or evaluating one specific B-NNN to convert it (use $promote).
    targets:
      agent_skill:
        body_file: bodies/backlog.agent.md
      claude_skill:
        body_file: bodies/backlog.claude.md

  promote:
    description: |
      EVALUATE-AND-CONVERT one specific backlog item. Triggered ONLY by /promote <B-NNN> or "$promote B-NNN" with an explicit backlog ID. AI reads the item, asks missing questions, proposes a plan, confronts locks/risks, asks worktree y/n, then converts the B-NNN into F-NNN or I-NNN. Do NOT use for: adding or listing backlog items (use $backlog), or creating a task without going through backlog first (use $feature or $issue).
    targets:
      agent_skill:
        body_file: bodies/promote.agent.md
      claude_skill:
        body_file: bodies/promote.claude.md

  ready:
    description: |
      HANDOFF to developer validation — does NOT close the task. THE AGENT runs this when implementation is finished, NOT the human; it is the gate that forces human-in-the-loop before $finish. Triggered by /ready or "$ready" / "pronto para validar / enviar para teste". Marks the in-progress F-NNN/I-NNN as awaiting manual validation and records changed files, summary, and pending checks. Do NOT use for: closing an already-validated task (use $finish), or just inspecting the current task without changing its state (use $status).
    targets:
      agent_skill:
        body_file: bodies/ready.agent.md
      claude_skill:
        body_file: bodies/ready.claude.md

  finish:
    description: |
      CLOSE an ALREADY-validated task; runs the docs-check hook, commits by default and optionally creates a lock. Triggered by /finish or "$finish" / "finalizar / fechar / concluir tarefa validada". Use ONLY after the developer explicitly confirms the work is final — never as a shortcut to skip validation. Do NOT use for: sending the task to validation first (use $ready), or showing current state without closing (use $status).
    targets:
      agent_skill:
        body_file: bodies/finish.agent.md
      claude_skill:
        body_file: bodies/finish.claude.md

  status:
    description: |
      READ-ONLY: show the current active task and the suggested chat title. Triggered by /status or "$status" / "qual a tarefa atual / status do processo". Never creates, modifies, advances, or closes a task. Do NOT use for: creating tasks (use $feature or $issue), handoff to validation (use $ready), or closing a validated task (use $finish).
    targets:
      agent_skill:
        body_file: bodies/status.agent.md
      claude_skill:
        body_file: bodies/status.claude.md
